<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- relay hub -->
    <circle cx="256" cy="256" r="34" fill="#FFFFFF" stroke="none"/>
    <!-- three peers connected to the hub -->
    <circle cx="120" cy="140" r="26"/>
    <circle cx="392" cy="140" r="26"/>
    <circle cx="256" cy="404" r="26"/>
    <line x1="142" y1="158" x2="232" y2="238"/>
    <line x1="370" y1="158" x2="280" y2="238"/>
    <line x1="256" y1="290" x2="256" y2="378"/>
  </g>
  <!-- key teeth motif marking the signing role -->
  <g fill="#FBBF24">
    <circle cx="256" cy="248" r="14"/>
    <rect x="250" y="256" width="12" height="40" rx="4"/>
    <rect x="262" y="276" width="18" height="10" rx="3"/>
  </g>
</svg>
